<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página de Pago</title>
</head>
<body>


  <h1 style=>Finalizar Compra</h1>

  <table border="1" width="100%" cellpadding="8">
    <tr>
      <td width="50%" valign="top">
        <h3>Datos del Cliente</h3>
        <form>

          <label>Nombre:</label><br>
          <input type="text" name="nombre"><br><br>

          <label>Correo:</label><br>
          <input type="email" name="correo"><br><br>

          <label>Telefono:</label><br>
          <input type="tel" name="telefono"><br><br>

          <h3>Tipo de Envio</h3>
          <input type="radio" name="envio" checked> Envio normal (3-5 dias)<br>
          <input type="radio" name="envio"> Envio ripido (1-2 dias)<br>
          <input type="radio" name="envio"> Retiro en tienda<br><br>

          <h3>Forma de Pago</h3>
          <input type="radio" name="pago" checked> Tarjeta<br>
          <input type="radio" name="pago"> Transferencia<br>
          <input type="radio" name="pago"> Pago al recibir<br><br>

          <label>Numero de Tarjeta:</label><br>
          <input type="text" name="tarjeta"><br><br>

          <label>Vence:</label><br>
          <input type="text" placeholder="MM" size="2">
          <input type="text" placeholder="AA" size="2"><br><br>

          <label>CVV:</label><br>
          <input type="text" size="4"><br><br>
        </form>
      </td>
