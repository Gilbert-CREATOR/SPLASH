{% extends "layouts/app.html" %}
{% load static %}

{% block title %}Nueva contraseña · B&B Car Wash{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/login.css' %}">{% endblock %}

{% block content %}
<main>
    <section class="auth-card">
        <h1>Elige una nueva contraseña</h1>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
        <p style="margin-top:16px;text-align:center;"><a href="{% url 'login' %}">Volver al login</a></p>
    </section>
</main>
{% endblock %}
