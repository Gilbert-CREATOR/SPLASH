<!DOCTYPE html>
<html>
<head>
  <title>Carrito de Compras</title>
</head>
<body>

  <h1>Carrito de compras</h1>
  <hr>

  <h2>Produtos</h2>

  <table border="1">
    <tr>
      <td><img src="images/llave2.jpg" alt="una llave" width="200" height="150"></td>
      <td>
        <p>Llave </p>
        <p>$0.00</p>
      </td>
      <td>
        <button>-</button>
        <input type="text" value="1" size="1" readonly>
        <button>+</button>
      </td>
    </tr>
    <tr>
      <td><img src="images/martillo.jpg" alt="un martillo" width="200" height="150"></td>
      <td>
        <p>Un Martillo</p>
        <p>$0.00</p>
      </td>
      <td>
        <button>-</button>
        <input type="text" value="1" size="1" readonly>
        <button>+</button>
      </td>
    </tr>
  </table>

  <hr>

  <p>Total: $0.00</p>

  <button>Ir al pago</button>

</body>
</html>
